services:
  python-api:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: khabari-python-api
    restart: unless-stopped
    ports:
      - "${PYTHON_API_PORT:-8000}:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB: ${MONGODB_DB:-Khabari}
      WATCHLIST: ${WATCHLIST:-SPY,QQQ,AAPL,MSFT,NVDA,AMZN,GOOGL,META,TSLA,AMD,AVGO,JPM,BAC,GS,NFLX,TSM,HOOD,PLTR,NOW,MSTR,COIN,SMCI,ARM,RDDT}
      WATCHLIST_AUTO_FAMOUS: ${WATCHLIST_AUTO_FAMOUS:-true}
      INITIAL_CASH: ${INITIAL_CASH:-1000}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
      GEMINI_FALLBACK_MODELS: ${GEMINI_FALLBACK_MODELS:-gemini-3.1-flash-lite,gemini-flash-latest}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      MARKET_TIMEZONE: ${MARKET_TIMEZONE:-America/New_York}
      MARKET_START_HOUR: ${MARKET_START_HOUR:-9}
      MARKET_END_HOUR: ${MARKET_END_HOUR:-16}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      NEWS_SCAN_MINUTES: ${NEWS_SCAN_MINUTES:-30}
      POSITION_MONITOR_MINUTES: ${POSITION_MONITOR_MINUTES:-60}
      ANALYZE_COOLDOWN_MINUTES: ${ANALYZE_COOLDOWN_MINUTES:-25}
      BACKUP_ANALYZE_HOURS: ${BACKUP_ANALYZE_HOURS:-2}
      MAX_ANALYZES_PER_DAY: ${MAX_ANALYZES_PER_DAY:-16}
      MAX_LLM_CALLS_PER_DAY: ${MAX_LLM_CALLS_PER_DAY:-0}
      MAX_DAILY_SPEND_USD: ${MAX_DAILY_SPEND_USD:-1}
      MAX_MONTHLY_SPEND_USD: ${MAX_MONTHLY_SPEND_USD:-25}
      QUOTA_PAUSE_MINUTES: ${QUOTA_PAUSE_MINUTES:-90}
      NEWS_MIN_NEW_ARTICLES: ${NEWS_MIN_NEW_ARTICLES:-2}
      MIN_NOTIFY_CONFIDENCE: ${MIN_NOTIFY_CONFIDENCE:-58}
      NOTIFY_ONLY_ACTIONABLE: ${NOTIFY_ONLY_ACTIONABLE:-true}
      POSITION_TAKE_PROFIT_PCT: ${POSITION_TAKE_PROFIT_PCT:-5}
      POSITION_STOP_LOSS_PCT: ${POSITION_STOP_LOSS_PCT:-3.5}
      ANALYZE_PERIOD: ${ANALYZE_PERIOD:-5d}
      ANALYZE_INTERVAL: ${ANALYZE_INTERVAL:-15m}
      DAY_WRAP_ENABLED: ${DAY_WRAP_ENABLED:-true}
      DAY_WRAP_HOUR: ${DAY_WRAP_HOUR:-16}
      DAY_WRAP_MINUTE: ${DAY_WRAP_MINUTE:-15}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      HISAAB_BASE_URL: ${HISAAB_BASE_URL:-}
      NTFY_TOPIC: ${NTFY_TOPIC:-}
      NTFY_SERVER: ${NTFY_SERVER:-https://ntfy.sh}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      MARKETAUX_API_TOKEN: ${MARKETAUX_API_TOKEN:-}
      NEWSDATA_API_KEY: ${NEWSDATA_API_KEY:-}
      OPTIONS_WATCHLIST: ${OPTIONS_WATCHLIST:-TSLA,NVDA,AAPL,MSFT,AMZN}
      OPTIONS_INITIAL_CASH: ${OPTIONS_INITIAL_CASH:-1000}
      OPTIONS_MIN_NOTIFY_CONFIDENCE: ${OPTIONS_MIN_NOTIFY_CONFIDENCE:-65}
      OPTIONS_MAX_PREMIUM_PCT: ${OPTIONS_MAX_PREMIUM_PCT:-0.40}
      OPTIONS_MIN_CASH_PCT: ${OPTIONS_MIN_CASH_PCT:-0.05}
      OPTIONS_SCHEDULER_ENABLED: ${OPTIONS_SCHEDULER_ENABLED:-true}
      OPTIONS_BACKUP_ANALYZE_HOURS: ${OPTIONS_BACKUP_ANALYZE_HOURS:-1}
      OPTIONS_TAKE_PROFIT_PCT: ${OPTIONS_TAKE_PROFIT_PCT:-40}
      OPTIONS_STOP_LOSS_PCT: ${OPTIONS_STOP_LOSS_PCT:-35}
      OPTIONS_AUTO_MOVERS: ${OPTIONS_AUTO_MOVERS:-true}
      OPTIONS_MOVER_TOP_N: ${OPTIONS_MOVER_TOP_N:-10}
      OPTIONS_MOVER_MIN_ABS_PCT: ${OPTIONS_MOVER_MIN_ABS_PCT:-1.5}
      OPTIONS_MOVER_UNIVERSE_EXTRA: ${OPTIONS_MOVER_UNIVERSE_EXTRA:-SPY,QQQ,IWM,AMD,COIN,HOOD,ORCL,PLTR,NFLX,BA,GS,JPM}
      OPTIONS_ANALYZE_MAX_SYMBOLS: ${OPTIONS_ANALYZE_MAX_SYMBOLS:-8}
      OPTIONS_MAX_CANDIDATES_FOR_LLM: ${OPTIONS_MAX_CANDIDATES_FOR_LLM:-15}
      LLM_TICKER_BATCH_SIZE: ${LLM_TICKER_BATCH_SIZE:-3}
      MAX_POSITION_PCT: ${MAX_POSITION_PCT:-0.40}
      MIN_CASH_PCT: ${MIN_CASH_PCT:-0.05}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  n8n:
    image: n8nio/n8n:latest
    container_name: khabari-n8n
    restart: unless-stopped
    depends_on:
      python-api:
        condition: service_healthy
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-changeme_n8n_password}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: America/New_York
      TZ: America/New_York
      PYTHON_API_URL: http://python-api:8000
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
